services:
  - type: web
    name: omegasportsagent-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        sync: false  # Set this in Render dashboard to your backend service URL
    buildFilter:
      paths:
        - frontend/**
    cacheDirectories:
      - frontend/.next/cache
      - frontend/node_modules
